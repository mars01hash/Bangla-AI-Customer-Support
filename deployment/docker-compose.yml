version: '3.8'

services:
  # 1. PostgreSQL Relational Database
  db:
    image: postgres:15-alpine
    container_name: customer_support_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: support_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Backend Service
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    container_name: customer_support_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/support_db
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - EMBEDDING_MODEL_NAME=sentence-transformers/LaBSE
    volumes:
      - chroma_data:/app/chroma_db
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # 3. Nginx-served React Frontend Client
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: customer_support_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # 4. Prometheus Monitoring Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: customer_support_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  # 5. Grafana Dashboard Telemetry Panel
  grafana:
    image: grafana/grafana:latest
    container_name: customer_support_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - prometheus

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
