[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["backend"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::sqlalchemy.exc.MovedIn20Warning"
]

[tool.coverage.run]
branch = true
source = ["backend/app"]
omit = ["tests/*", "backend/venv/*"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:"
]
