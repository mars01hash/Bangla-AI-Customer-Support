services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////data/support_platform.db
      - CHROMA_PERSIST_DIRECTORY=/data/chroma_db
    volumes:
      - app_data:/data
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app_data:
  uploads:
